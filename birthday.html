<!DOCTYPE html>
<html>

<head>

<title>Happy Birthday Mama</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Great+Vibes&family=Poppins:ital,wght@0,300;0,400;1,400&display=swap" rel="stylesheet">


<style>

body{

margin:0;
padding:0;

background:linear-gradient(to bottom,#ffe6f0,#ffffff);

text-align:center;

font-family:'Poppins',sans-serif;

overflow-y:auto;

}


.container{

padding:50px 20px 120px;

animation:fade 2s;

}


/* Main heading */

.heading{

font-family:'Great Vibes',cursive;

font-size:60px;

color:#ff4f9a;

text-shadow:0 0 15px pink;

line-height:1.4;

animation:glow 2s infinite alternate;

}


/* Message */

.message{

font-family:'Poppins',sans-serif;

font-style:italic;

font-size:20px;

color:#ff69b4;

line-height:1.9;

max-width:550px;

margin:25px auto;

padding:10px;

}


/* Video */

video{

width:280px;

border-radius:30px;

margin-top:25px;

box-shadow:0 8px 25px rgba(255,105,180,0.4);

}


/* Envelope */

.envelope{

position:fixed;

right:20px;

bottom:25px;

width:65px;

height:65px;

background:#ff4f9a;

border-radius:50%;

display:flex;

justify-content:center;

align-items:center;

text-decoration:none;

font-size:32px;

color:white;

box-shadow:0 8px 20px pink;

animation:float 2s infinite alternate;

}


/* Animations */


@keyframes glow{

from{

text-shadow:0 0 10px pink;

}

to{

text-shadow:0 0 30px hotpink;

}

}


@keyframes float{

from{

transform:translateY(0);

}

to{

transform:translateY(-10px);

}

}


@keyframes fade{

from{

opacity:0;

transform:translateY(30px);

}

to{

opacity:1;

transform:translateY(0);

}

}


</style>

</head>


<body>


<div class="container">


<div class="heading">

Happy Birthday<br>

Mama ✨🤍

</div>



<div class="message">

I hope your day becomes as beautiful as your smile,<br>

as soft as your heart,<br>

and as special as the happiness you bring into my life. 💖

<br><br>

Today is a reminder of how special you are.

May your life always be filled with love, laughter and endless happiness. 🌸✨

</div>



<video autoplay loop muted playsinline>

<source src="balloonpenguin.mp4" type="video/mp4">

</video>



</div>



<a href="surprise.html" class="envelope">

💌

</a>



</body>

</html>
