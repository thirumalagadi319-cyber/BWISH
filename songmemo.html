<!DOCTYPE html>
<html>

<head>

<title>Our Song</title>


<style>

body{

margin:0;

padding:0;

background:linear-gradient(#ffe6f0,#ffffff);

font-family:Arial;

text-align:center;

}


.container{

padding:40px 20px;

animation:fade 2s;

}


h1{

color:#ff1493;

font-size:42px;

}


.photo{

width:90%;

max-width:340px;

border-radius:25px;

box-shadow:0 8px 20px pink;

}


.message{

font-size:20px;

color:#ff1493;

line-height:1.8;

margin:25px;

}


audio{

width:90%;

max-width:330px;

}



@keyframes fade{

from{

opacity:0;

transform:translateY(30px);

}

to{

opacity:1;

transform:translateY(0);

}

}


</style>


</head>


<body>


<div class="container">


<h1>
🎶 A Song, A Memory, A Feeling ❤️
</h1>


<img src="photo2.jpg" class="photo">


<div class="message">

Some songs are more than just music...

<br><br>

They hold feelings, memories and moments that bring a smile every time we hear them. 🤍✨

</div>


<audio controls>

<source src="Aradhya Song.mp3" type="audio/mpeg">

</audio>


</div>


</body>

</html>
