<!DOCTYPE html>
<html>

<head>

<title>Our Special Memory ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Great+Vibes&family=Poppins:ital,wght@0,300;0,400;1,400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
padding:0;
background:linear-gradient(to bottom,#ffe6f0,#ffffff);
font-family:'Poppins',sans-serif;
text-align:center;
overflow-y:auto;
}

.container{
padding:40px 20px 80px;
animation:fade 2s;
}

h1{
font-family:'Great Vibes',cursive;
font-size:56px;
color:#ff1493;
text-shadow:0 0 12px pink;
margin-bottom:20px;
}

video{
width:90%;
max-width:340px;
border-radius:25px;
box-shadow:0 8px 20px rgba(255,105,180,.4);
margin-top:10px;
margin-bottom:25px;
}

.message{
font-family:'Poppins',sans-serif;
font-style:italic;
font-size:20px;
color:#ff1493;
line-height:1.8;
padding:0 20px;
margin-bottom:25px;
}

audio{
width:90%;
max-width:330px;
margin-top:10px;
}

.footer{
margin-top:30px;
font-family:'Dancing Script',cursive;
font-size:24px;
color:#ff4f9a;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="container">

<h1>
🎥 Our Beautiful Memory ❤️
</h1>

<video controls autoplay loop playsinline>

<source src="memo.mp4" type="video/mp4">

Your browser does not support the video tag.

</video>

<div class="message">

Every time I watch this video, it reminds me of the beautiful moments we've shared together. 🤍✨

Some memories never fade—they stay in our hearts forever and always bring a smile whenever we remember them. 💖

</div>

<audio controls>

<source src="Aradhya Song.mp3" type="audio/mpeg">

Your browser does not support the audio element.

</audio>

<div class="footer">

Made with endless love, just for you. 💌🤍

</div>

</div>

</body>

</html>
