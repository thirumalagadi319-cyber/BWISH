<!DOCTYPE html>
<html>

<head>

<title>Missing You</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Great+Vibes&family=Poppins:ital,wght@0,300;0,400;1,400&display=swap" rel="stylesheet">


<style>

body{

margin:0;
padding:0;

background:linear-gradient(#ffe6f0,#ffffff);

text-align:center;

font-family:'Poppins',sans-serif;

overflow-y:auto;

}


.container{

padding:50px 20px 80px;

animation:fade 2s;

}


/* Heading */

h1{

font-family:'Great Vibes',cursive;

font-size:55px;

color:#ff4f9a;

text-shadow:0 0 15px pink;

line-height:1.4;

}


/* Small video */

.cryvideo{

width:160px;

height:auto;

border-radius:25px;

margin-top:20px;

box-shadow:0 8px 20px pink;

}


/* Message */

.sad{

font-family:'Dancing Script',cursive;

font-size:35px;

color:#ff1493;

line-height:1.7;

max-width:500px;

margin:25px auto;

}


/* Animation */

@keyframes fade{

from{

opacity:0;

transform:translateY(30px);

}

to{

opacity:1;

transform:translateY(0);

}

}

</style>

</head>


<body>


<div class="container">


<h1>
🥺 Missing You More Than Words Can Say 🤍
</h1>


<video class="cryvideo" autoplay loop muted playsinline>

<source src="cryingpenguin.mp4" type="video/mp4">

</video>



<h2 class="sad">

Distance may keep us apart,<br>

but memories always keep us close. 💖

<br><br>

Until we meet again...<br>

Take care and keep smiling. ✨

</h2>



</div>


</body>

</html>
