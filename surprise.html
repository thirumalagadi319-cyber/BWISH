<!DOCTYPE html>
<html>

<head>

<title>Little Surprise</title>

<style>

body{

margin:0;
padding:0;

background:linear-gradient(#ffe6f0,#ffffff);

font-family:Arial;

text-align:center;

}


.container{

padding:50px 20px;

animation:fade 2s;

}


.message{

font-size:23px;

color:#ff4f9a;

line-height:1.8;

font-weight:bold;

margin-bottom:30px;

}


video{

width:90%;

max-width:360px;

border-radius:25px;

box-shadow:0 8px 20px pink;

}



@keyframes fade{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>


</head>


<body>


<div class="container">


<div class="message">

💌 A Little Surprise For You...

<br><br>

Sometimes the smallest gifts carry the biggest feelings.

<br>

This little moment was created with lots of love, hoping it brings a beautiful smile to your face. 🤍✨

</div>



<video autoplay muted loop playsinline>

<source src="surprise.mp4">

</video>


</div>


</body>

</html>
